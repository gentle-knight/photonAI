# 默认配置：MZM MoE PINN（按 notebook 迁移）

data_path: data/dataset.txt
best_hyperparams_path: best_hyperparams.json

data:
  test_size: 0.1
  random_state: 123
  filter_v_pi_max: 500.0

model:
  input_dim: 8
  output_dim: 3
  hidden_dims: [64, 128, 64]
  n_experts: 60
  gating_hidden: 8
  dropout_rate: 0.0
  use_bn: true
  activation: relu

optimizer:
  lr: 0.001
  weight_decay: 0.05
  betas: [0.9, 0.999]

training:
  batch_size: 128
  epochs: 100
  num_workers: 0

# 默认会先从 best_hyperparams.json 读取这些系数，再用此处显式值覆盖
physics:
  lambda_bw_mon: 0.0
  lambda_IL_mon: 0.3
  lambda_vpiL: 0.005
  lambda_smooth: 0.1

output_dir: results
last_run_dir: null
